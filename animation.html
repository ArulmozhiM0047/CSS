<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style type="text/css">
        img
        {
            position:relative;
            animation-name: sudha;
            animation-duration: 3s;
            animation-iteration-count: infinite;
            animation-direction: normal;
        }
        @keyframes sudha
        {
            0%{left:0px;top:0px}
            20%{left:1000px;top:0px}
            50%{left:1000px;top:400px}
            75%{left:0px;top:400px}
            100%{left:0px;top:0px}
        }
    </style>
</head>
<body>
    <img width="300" src="./images/google image.png">
    
</body>
</html>
